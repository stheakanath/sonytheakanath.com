<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASCII + Dither + Motion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: #e8e8e8;
    }

    #label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 24px;
    }

    #ascii-output {
      line-height: 1.0;
      font-size: 7px;
      letter-spacing: 0.12em;
      white-space: pre;
      color: #e8e8e8;
      user-select: none;
    }

    #controls {
      margin-top: 24px;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .ctrl-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #444;
      text-transform: uppercase;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100px;
      height: 2px;
      background: #333;
      outline: none;
      border-radius: 2px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e8e8e8;
      cursor: pointer;
    }

    #start-btn {
      background: none;
      border: 1px solid #333;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    #start-btn:hover { border-color: #888; }

    #status {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #444;
      margin-top: 12px;
    }

    /* hidden canvas for processing */
    canvas { display: none; }
  </style>
</head>
<body>

  <div id="label">Dither + ASCII + Motion</div>
  <div id="ascii-output">Press start to activate camera</div>
  <canvas id="canvas"></canvas>
  <video id="video" autoplay playsinline muted></video>

  <div id="controls">
    <span class="ctrl-label">Resolution</span>
    <input type="range" id="res-slider" min="60" max="180" value="100" step="10" />
    <span class="ctrl-label">Contrast</span>
    <input type="range" id="contrast-slider" min="0.5" max="3" value="1.2" step="0.1" />
    <button id="start-btn">Start Camera</button>
  </div>
  <div id="status"></div>

  <script>
    // ASCII ramp from darkest to brightest
    const RAMP = ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';

    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d', { willReadFrequently: true });
    const output  = document.getElementById('ascii-output');
    const status  = document.getElementById('status');
    const resSlider      = document.getElementById('res-slider');
    const contrastSlider = document.getElementById('contrast-slider');
    const startBtn       = document.getElementById('start-btn');

    let running = false;
    let animId  = null;

    // Bayer 4x4 dither matrix (normalized 0-1)
    const BAYER4 = [
       0/16,  8/16,  2/16, 10/16,
      12/16,  4/16, 14/16,  6/16,
       3/16, 11/16,  1/16,  9/16,
      15/16,  7/16, 13/16,  5/16
    ];

    function applyBayerDither(brightness, x, y) {
      const threshold = BAYER4[(y % 4) * 4 + (x % 4)];
      // Spread the brightness with dither threshold
      return Math.min(1, Math.max(0, brightness + (threshold - 0.5) * 0.35));
    }

    function renderFrame() {
      if (!running) return;

      const cols = parseInt(resSlider.value);
      // Maintain roughly 2:1 char aspect ratio (chars are taller than wide)
      const charAspect = 2.2;
      const rows = Math.floor(cols / charAspect * (canvas.height / canvas.width));

      const blockW = canvas.width  / cols;
      const blockH = canvas.height / rows;
      const contrast = parseFloat(contrastSlider.value);

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      let lines = [];

      for (let row = 0; row < rows; row++) {
        let line = '';
        for (let col = 0; col < cols; col++) {
          // Sample center pixel of each block
          const px = Math.floor((col + 0.5) * blockW);
          const py = Math.floor((row + 0.5) * blockH);
          const idx = (py * canvas.width + px) * 4;

          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];

          // Perceived luminance
          let lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;

          // Apply contrast
          lum = Math.min(1, Math.max(0, (lum - 0.5) * contrast + 0.5));

          // Bayer dither
          const dithered = applyBayerDither(lum, col, row);

          // Map to ASCII ramp
          const charIdx = Math.floor(dithered * (RAMP.length - 1));
          line += RAMP[charIdx];
        }
        lines.push(line);
      }

      output.textContent = lines.join('\n');
      animId = requestAnimationFrame(renderFrame);
    }

    async function startCamera() {
      try {
        status.textContent = 'Requesting camera access...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        canvas.width  = video.videoWidth  || 640;
        canvas.height = video.videoHeight || 480;

        running = true;
        status.textContent = '';
        startBtn.textContent = 'Stop Camera';
        renderFrame();
      } catch (err) {
        status.textContent = 'Camera access denied or unavailable.';
        console.error(err);
      }
    }

    function stopCamera() {
      running = false;
      if (animId) cancelAnimationFrame(animId);
      const stream = video.srcObject;
      if (stream) stream.getTracks().forEach(t => t.stop());
      video.srcObject = null;
      output.textContent = 'Press start to activate camera';
      startBtn.textContent = 'Start Camera';
    }

    startBtn.addEventListener('click', () => {
      if (!running) startCamera();
      else stopCamera();
    });
  </script>
</body>
</html>
