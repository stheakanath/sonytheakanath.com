<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sony Theakanath — New York</title>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Karla', sans-serif;
      font-size: 17px;
      background: #fff;
      color: #111;
      height: 100%;
      overflow: hidden;
    }

    /* ── Top nav (matches site header) ─────────────────────────────────── */
    .site-header {
      border-bottom: 0.5px solid lightgrey;
      padding: 18px 5%;
      max-width: 100%;
    }
    .site-header a {
      font-family: 'Karla', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #A52A2A;
      text-decoration: none;
    }
    .site-header a:hover { color: #000; }

    /* ── Page title area ────────────────────────────────────────────────── */
    .page-intro {
      padding: 28px 5% 20px;
      border-bottom: 0.5px solid lightgrey;
    }
    .page-intro h1 {
      font-family: 'Karla', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .page-intro p {
      font-size: 15px;
      color: #666;
      line-height: 1.5;
    }

    /* ── Main layout: list left, map right ──────────────────────────────── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Wrapper to make body a flex column so main-layout fills remaining space */
    .page-wrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Left: restaurant list ──────────────────────────────────────────── */
    .restaurant-list {
      width: 420px;
      min-width: 320px;
      overflow-y: auto;
      border-right: 0.5px solid lightgrey;
      flex-shrink: 0;
    }

    .restaurant-card {
      display: flex;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 0.5px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.12s;
      align-items: flex-start;
    }
    .restaurant-card:hover,
    .restaurant-card.active {
      background: #fafafa;
    }
    .restaurant-card.active {
      border-left: 3px solid #A52A2A;
      padding-left: 17px;
    }

    .card-number {
      font-family: Consolas, "Liberation Mono", Courier, monospace;
      font-size: 11px;
      color: #bbb;
      min-width: 20px;
      padding-top: 3px;
    }

    .card-image {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f5f5f5;
    }
    .card-image-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 6px;
      background: #f5f5f5;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }
    .card-name {
      font-weight: 700;
      font-size: 15px;
      color: #111;
      margin-bottom: 2px;
      line-height: 1.3;
    }
    .card-neighborhood {
      font-family: Consolas, "Liberation Mono", Courier, monospace;
      font-size: 11px;
      color: #999;
      margin-bottom: 5px;
    }
    .card-note {
      font-size: 13px;
      color: #555;
      line-height: 1.45;
      margin-bottom: 5px;
    }
    .card-must-get {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .must-get-tag {
      font-size: 11px;
      background: #f5f0f0;
      color: #A52A2A;
      border-radius: 3px;
      padding: 2px 7px;
      font-family: 'Karla', sans-serif;
    }

    /* ── Right: map ─────────────────────────────────────────────────────── */
    #map {
      flex: 1;
      height: 100%;
    }

    /* ── Leaflet popup styling ──────────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      font-family: 'Karla', sans-serif;
    }
    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }
    .popup-name {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 3px;
    }
    .popup-note {
      color: #555;
      margin-bottom: 6px;
    }
    .popup-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .popup-tag {
      font-size: 11px;
      background: #f5f0f0;
      color: #A52A2A;
      border-radius: 3px;
      padding: 2px 6px;
    }

    /* ── Custom map marker ──────────────────────────────────────────────── */
    .map-marker {
      background: #A52A2A;
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Consolas, monospace;
      font-size: 10px;
      font-weight: bold;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
    }
    .map-marker.active {
      background: #111;
      transform: scale(1.2);
    }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    /* (hidden on this page since it's full-height) */

    /* ── Scrollbar styling ──────────────────────────────────────────────── */
    .restaurant-list::-webkit-scrollbar { width: 4px; }
    .restaurant-list::-webkit-scrollbar-track { background: transparent; }
    .restaurant-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    /* ── Mobile ─────────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      html, body { height: 100%; overflow: hidden; }
      .page-wrapper { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
      .site-header { padding: 14px 5%; flex-shrink: 0; }
      .site-header a { font-size: 18px; }
      .page-intro { padding: 16px 5% 14px; flex-shrink: 0; }
      .page-intro h1 { font-size: 20px; }
      .page-intro p { font-size: 13px; }
      .main-layout { flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
      .restaurant-list { width: 100%; height: 55%; min-width: unset; border-right: none; border-bottom: 0.5px solid lightgrey; overflow-y: auto; flex-shrink: 0; }
      #map { flex: 1; height: 45%; min-height: 200px; }
      .restaurant-card { padding: 14px 16px; gap: 12px; }
      .card-image { width: 60px; height: 60px; }
      .card-name { font-size: 14px; }
      .card-note { font-size: 12px; }
    }
  </style>
</head>

// ── Build restaurant list ──────────────────────────────────────────────────
const listEl = document.getElementById('restaurant-list');

restaurants.forEach((r, i) => {
  const card = document.createElement('div');
  card.className = 'restaurant-card';
  card.id = `card-${r.id}`;
  card.dataset.index = i;

  const tagsHTML = r.mustGet.map(t => `<span class="must-get-tag">${t}</span>`).join('');

  card.innerHTML = `
    <div class="card-number">${String(i + 1).padStart(2, '0')}</div>
    <img class="card-image" src="${r.image}" alt="${r.name}" onerror="this.style.display='none'">
    <div class="card-body">
      <div class="card-name">${r.name}</div>
      <div class="card-neighborhood">${r.neighborhood}</div>
      <div class="card-note">${r.note}</div>
      <div class="card-must-get">${tagsHTML}</div>
    </div>
  `;

  card.addEventListener('click', () => selectRestaurant(i));
  listEl.appendChild(card);
});

// ── Init map ───────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [40.730, -73.990],
  zoom: 13,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// ── Add markers ────────────────────────────────────────────────────────────
const markers = [];

restaurants.forEach((r, i) => {
  if (!r.lat || !r.lon) return;

  const markerEl = document.createElement('div');
  markerEl.className = 'map-marker';
  markerEl.textContent = i + 1;

  const icon = L.divIcon({
    html: markerEl.outerHTML,
    className: '',
    iconSize: [26, 26],
    iconAnchor: [13, 13]
  });

  const tagsHTML = r.mustGet.map(t => `<span class="popup-tag">${t}</span>`).join('');

  const marker = L.marker([r.lat, r.lon], { icon })
    .addTo(map)
    .bindPopup(`
      <div class="popup-name">${r.name}</div>
      <div class="popup-note">${r.note}</div>
      <div class="popup-tags">${tagsHTML}</div>
    `, { maxWidth: 240 });

  marker.on('click', () => selectRestaurant(i));
  markers.push(marker);
});

// ── Invalidate map size after layout settles (fixes mobile blank map) ────────
window.addEventListener('load', () => { setTimeout(() => map.invalidateSize(), 100); });

// ── Select / highlight ─────────────────────────────────────────────────────
let activeIndex = null;

function selectRestaurant(i) {
  // Deactivate previous
  if (activeIndex !== null) {
    document.getElementById(`card-${restaurants[activeIndex].id}`)?.classList.remove('active');
  }

  activeIndex = i;
  const r = restaurants[i];

  // Activate card
  const card = document.getElementById(`card-${r.id}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Pan map and open popup
  if (r.lat && r.lon) {
    map.setView([r.lat, r.lon], 15, { animate: true });
    if (markers[i]) markers[i].openPopup();
  }
}
</script>

</body>
</html>
